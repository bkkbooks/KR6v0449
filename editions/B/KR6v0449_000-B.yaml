  text: 凡例一原本和裝本袋綴一丁半面二十三一糎十六二糎一行十九字詰八行一卷八十七丁筆寫本翻刻一頁一行三十一字詰十五行二原本章節分內容考慮上改行通讀便宜三原本一部分返點句點施翻刻當檢討經始終通句讀點附四翻刻際原本原形筆寫本書體近活字用從同一用語文字統一部分五文字原本墨朱傍記符號又補記檢討適切思方採記号文字當出典參照訂正場合明誤寫思場合適宜訂正研究篇本文校注參照六本文中註記符號数学文字研究篇本文校注番號漢字研究篇引用文典據番號
