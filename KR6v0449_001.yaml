body:
  text: 釋元曉撰二鄣義六門分別一釋名義二出體相三辨功能四攝諸門五明治斷六惣決擇第一釋名言二鄣者一煩惱鄣亦名惑鄣二所知鄣亦名智鄣或有異門名煩惱㝵及與智㝵煩惱鄣者貪瞋等惑煩勞為性適起現行惱亂身心故名煩惱此當體從功能立名又復能感界內煩惱之報逼惱有情令離寂靜故名煩惱是為因中說果名也鄣以遮止為義亦用覆蔽為功遮止有情不出生死覆蔽理性不顯涅槃由是二義故名為鄣此從義用而受名也所知鄣者盡所有性如所有性二智所照故名所知法執等惑遮止智性不成現觀覆蔽境性不現觀心由是義故名所知鄣此從所蔽及用得名然人執等惑亦有鄣於少分境智而未遮於無上菩提亦不蔽於一切種境雖已斷此不得彼故是故不立所知鄣名法執等惑亦有少分感生死義而不蔽於二乘涅槃亦不止於分段生死雖不斷此而證理故是故不受煩惱鄣名與奪之意義在此乎惑智之名如常所說或名煩惱㝵智㝵者六種染心動念取相違平等性離相無動由乖寂靜名煩惱㝵根本無明正迷諸法無所得性能鄣俗智無所不得由不了義故名智㝵此中煩惱是當能㝵過名智是從彼所㝵德稱廢立之意准前可知第二出體略有二門謂顯了門及隱密門顯了門內委曲有五重一當自性以出體相二依八識三性簡體三約纏及隨眠辨體四就正使與習氣明體五據五法以定鄣體初當自性出鄣體者人執為首根本煩惱忿恨覆等諸隨煩惱是為煩惱鄣之自性論其眷屬彼相應法及所發業并所感果報相從通入煩惱鄣體所知鄣者法執為首妄想分別及與法愛𢢔無明等以為其體論其助伴者彼相應法并所取相亦入其中二依八識三性簡體者煩惱鄣體不與阿賴識相應唯共七種轉識俱起於中愛與無明通七種識𢢔通二識瞋唯不通第七末那疑及四見唯在意識薩迦耶見在意意識薩迦耶中有二行所謂我行及我所行如是二行亦通二識意識二行義在可見末那相應二行相者直緣阿賴耶識自體而作我行兼緣彼識體上諸相作我所行言諸相者與彼相應五種心法及與一切十八界相如是諸相皆從彼識種子所起悉是彼識明鏡所現是故末那亦得並緣喻如眼識緣明鏡時亦有二種了別相一者了別鏡體明色二亦了別於中影像而不能計鏡外有像末那二行其義亦爾而不能計識外有法故惣相說還緣彼識如直說言眼識緣鏡當知亦緣鏡內現影是不待言論此亦如是直說末那還緣彼識當知兼緣識內現相不待言論故不煩說如顯揚論云意者謂從阿賴耶識種子所生還緣彼識我癡我愛我我所執我𢢔相應故其我見中有二種緣一緣自依止二緣他依止末那所起唯有初緣意識之中具二種緣緣自我見有二種起謂分別起及任運起末那有後意識具二如瑜伽說四種我見為所依止能生我𢢔一有分別我見謂諸外道所起二俱生我見謂下至禽獸等亦能生起三自依止我見謂各別內身所起四緣他依止我見謂於他身所起故諸隨煩惱隨其所應在七種識於中委曲准之可解論三性者三性法門乃有多種今且依一自性門說色無色界一切煩惱及欲界中末那四惑皆是有覆無記性攝五識所起貪恚癡等是不善性不善意識之等流故如瑜伽說決定心後方有染淨此後乃有等流眼識善不善轉而彼不由自分別力如眼識生乃至身識應知亦爾故欲界意識所起之中若分別起一切煩惱悉是不善任運起中身邊二見是無記性如瑜伽說復次俱生薩迦耶見唯無記性數現行故非極損惱自他處故若分別起由堅執故與前相違在欲界者唯不善性故愛𢢔無明能發修斷不善業者是不善性結生之時微細現行是無記性如對法論云九種命終心自體愛相應此愛唯是有覆無記性故瞋恚一種唯不善性而亦通善心中起如瑜伽說又由自性建立如是黑白俱業謂如亦有一隨於一所許作利益即由餘事復於其所作不利益如於暴虎作惡人所發生瞋恚俱行之思不喜彼惡當知此思瞋俱行故墮黑分中不喜樂彼惡俱行故墮白分中是故此業說名黑白如是所餘種類亦爾故隨煩惱中尋伺惡作睡眠此四通於三性而在善中未必皆是隨煩惱性如於夢中修無漏道此中眠數非惑性故其餘三種准此可知放逸等十及誑諂憍唯通不善有覆無記忿恨覆惱慳嫉與害無慚無愧如是九種唯不善性此中無慚無愧論其自性遍行一切不善心中若說增用愧通一切慚未必通如瑜伽說無慚無愧通與一切不善相應又上文言慚現前時必愧現前若愧現前不必有慚例如四無色薀自性必俱論其用增次第現前故亦說言從此初心生後三心此二生起道理亦爾餘隨煩惱生起道理如論廣說彼言隨煩惱者略由四相差別建立謂無慚無愧亦通一切不善心起放逸掉舉惛沈不信懈怠邪欲勝解妄念散亂不正知此十通一切染污心起通一切處三界所繫忿恨覆惱嫉慳誑諂憍害此十各別不善心起若一生時必無第二如是十種皆欲界繫除誑諂憍由誑及諂至初靜慮憍通三界此并前二若在上地唯無記性尋伺惡作睡眠此四通三性心非一切處非一切時若有極久尋求伺察便令身疲念失心亦勞損是故尋伺名隨煩惱此二乃至初靜慮地惡作睡眠唯在欲界故煩惱鄣相略說如是所知鄣體其相云何或有說者法執無明唯在第六第七二識不通餘識推求性故法愛恚等非見所攝不推求者亦通五識如攝論說能遍計心唯意識故一切不通阿賴耶識如瑜伽說阿賴耶識不與煩惱而共相應故若此識中有法執者成法我見有無明等不應唯與五法相應又若此識有法執者無所薰故應念念失不須對治即成大過又法空觀初現前時此識應斷鄣治相違不俱行故若爾所餘有漏種子應無所依所修功德應無薰習無所薰故亦不可言薰習鏡智非無記故猶未得故故知法執不通此識於三性中唯在不善有覆無記雖復不染二乘聖道而有染覆菩薩道故由是義故亦名有覆亦名無覆一體二名所望別故不通四種一向無覆無記心中於轉識中異熟果者與異熟識性類同故分別力劣不能執故威儀等心不竪執故非普遍故又亦不通一切善心與無明等性相違故必與無癡善根俱故如瑜伽說無明有二一者不善二者無記又有二種一者染污二不染污不言有善故設使法空觀前方便道中有法執者即應人空觀前方便道中亦起人執而於此中既無此事故知於彼亦無法執也或有說者法執分別遍通八識未達法空故取相分別故如深密經言微細隨眠者謂八地已上從此以去一切煩惱不復現行唯有所知鄣為依止故此明八地已上唯所知鄣現行不可說此轉識所起不與隨眠作依止故當知是說阿賴耶識微細所知鄣現行不絶又中邊論說塵根我及識本識生似彼但識有無彼彼無故識無但識有者但亂識有無彼者謂無四物即下文言此亂識云何名虛妄由境不實故由體散亂然此識中想數為首取相分別即不了達無相真如故名法執亦名無明非推求性計度實有故無惠等餘心數法又此妄想最極微細唯與大圓鏡智相違是故不妨諸轉識智由是義故亦能受薰是無記故非極香臭之所記故如人衣等仙即覺臭而亦能受香臭所薰非極臭故此識亦爾如攝論言無記者是不可記極香臭義故又復此識雖無所薰而自前後相生相續未得對治終無斷絶既無隔滅何得薰習若無所薰即有失者種子無薰應念念失而此種子雖無所薰前後相續無隔絶故雖念念滅非念念失此識法執當知亦爾由此道理故無過失但無一切煩惱鄣故說言不與煩惱相應不言不與所知鄣俱是故此文亦無相違阿賴耶識尚有妄想何況五識而無法執如涅槃經言如是五識雖非一念然是有漏復是顛倒增諸漏故名為有漏體非真實著相故倒是知五識亦有倒執然此五識唯著五塵不能遍計亦不取名故說遍計唯是意識若依此文證五識中無法執者即成那亦無法執故知此文於彼非證又所知鄣亦通三性乃至二乘人空無漏亦未能免法執分別所以者何如彼見道雖離一切方便道中意言分別於苦等諦離諸名言超過影像現量智生由是證入人空真如而即此時雖不取名猶於苦事取苦等相此邊未達法空真如倒於法我常樂等德例如五識雖無一切名言分別證色等塵現量知見而乖無相著相故倒當知此中道理亦爾如瑜伽說見道智行遠離衆相爾時聖智雖緣於苦然於苦事不起分別謂此為苦取相而轉餘諦亦爾先世俗智所觀諦中一切相想皆得解脫絶戲論智但於其義緣真如理離相而轉此文顯其不取名言通達人空真如理義寶性論云為對治此四種顛倒故有四種非顛倒法謂於色等無常事中無常等想如是四種顛倒對治若依法身復是顛倒此文顯其雖證人空故成無倒而迷法空此邊成倒又復法空觀前方便道中亦有法執即加行智未達法空分別取相說名無明亦名法執唯一惠數亦解亦執此中無別無明等數不同一向迷亂法執是故無有無癡善根與癡數等俱起過失如對法論云迷亂者謂能所取執不迷亂者謂出世智及後所得迷亂不迷亂者謂隨順出世智所有聞惠等諸善根分別所知境故隨順無分別智故瑜伽論云依空勤修念住菩薩略論六種妄想縛中令心解脫何等為六所謂於身乃至於法發起內想是初想縛即於此中發起外想是二想縛起內外想是三想縛若於十方諸有情界願令解脫修習念住此中諸想是四想縛若由此故於身心境修觀而住此中諸想是五想身縛即於身心修觀住者此中諸想是六想縛依此等文當知未入真觀已還一切心中不無妄想皆有迷亂迷亂妄想何非法執若言人空觀前方便道中無人執故亦於法空觀前方便道中無法執者他亦我觀前方便道中不取我故即於無相前方便道中亦不取相此不類者彼亦非類由是道理故無過失或有說者二師所說皆有道理所以然者若依別門粗相道理初師所說亦有道理於其通門巨細道理後師所說亦有道理由有如是二種理門諸文相違皆得善通設使將彼別相法執無明通置八識及三性者不應道理故有過失縱令此通相法執局在二識不通善者不應道理亦乖聖言二師所說既不如是是故二說皆有道理三約纏及隨眠以明二鄣體者本隨二惑現起之時繫縛義重說名為纏纏所熏發種類隨逐冥伏不覺故名隨眠隨眠與纏皆是鄣體如瑜伽說本隨二惑略二緣故染惱有情一由纏故二由隨眠故現行現起煩惱名纏即此種子未斷未害名曰隨眠亦名粗重又不覺位名曰隨眠若在覺位說名為纏故隨眠之內亦有二種一即種子二是粗重隨一品纏薰發此二其相云何染所熏發不發調柔性無堪能性在異熟識而非能生現纏之能此謂粗重不名種子又彼識中染所熏發成自類性故能生現行說名種子即不調柔亦名粗重如瑜伽說云何粗重相謂若略說無所堪能不調柔相是粗重相此相有五一現重相二剛強相三鄣㝵相四怯劣相五不自在相轉無堪能相由有此相順雜染品違清淨品是說粗重隨眠而非種子隨眠又彼論言於自體中所有種子若煩惱品所攝名為粗重亦名隨眠若異熟品所攝及餘無記品所攝唯名粗重不名隨眠若信等善法品所攝種子不名粗重亦非隨眠此說種子隨眠亦即是粗重義又彼論云世間靜慮但能漸捨彼品粗重不拔種子無漏靜慮二種俱捨此文並說二種隨眠此二和合能作鄣㝵故此二種俱為鄣體又種子內亦有二種謂本性界及習成種子此二和合能生現纏故二種子皆是鄣體如瑜伽說即於如是後有意中有無明種及無明界此二種子所隨逐意所緣法界彼由宿世依惡說法及毗那耶所生分別薩迦耶見以為依止集成今界即由此界增上力故發起俱生薩迦耶見於善說法毗那耶中亦復現行能為鄣㝵故如煩惱鄣有纏隨眠所知鄣中亦有二種種子即是性緣性分別是故亦為所知鄣如顯揚論云復次於依他起自體中有二種遍計所執自體分別謂隨緣覺及隨眠數習習氣隨眠莊嚴論云意言與習光名義互光起非真分別故是名分別相釋曰此偈顯分別相有其三種一有覺分別相二無覺分別相三相因分別相意言者謂義想義即想境想即心數由此想於義能如是如是起意言解此是有覺分別相習光者習謂意言種子光謂從種子直起義光未能如是如是起意言解此是無覺分別相互光起者謂依名起義光依義起名光境界非真唯是分別相此是相因分別相故依此等文當知現行種子皆是分別為知鄣體餘義差別准前可知四就正習簡鄣體者如上所說二鄣體性直㝵聖道名為正鄣由前數習滅後有氣髣佛相似故名習氣然此習氣惣說有二謂別習氣及通習氣別習氣者唯於煩惱鄣有於所知鄣即無是別習氣亦有現行及其種子其相云何且如有一生高貴家徑歷多生長習憍慢憍慢心中數習奴婢名言於中取相分別所薰種子即有二義謂生𢢔使及生取相此人修道得聖果後生𢢔使邊種子被斷生取相邊非其所斷故此種子能生現行無𢢔心中輒言奴婢如是等名𢢔使習氣餘惑習氣皆亦如是此等煩惱障之習氣不入煩惱鄣中所攝以非能鄣二乘道故取相分別迷法空理是故正為所知鄣體如瑜伽說又說阿羅漢或因習氣無染污心騫脣露齒逼爾而笑智度論說起儛等事是愛習氣呵水神等是𢢔習氣如是等文明別習氣所言通習氣者謂二鄣中皆有殘氣無有現行亦非種子唯彼氣類無堪能性故此習氣但名粗重其想云何如煩惱品所攝粗重對治未生其勢增強無漏道生種子滅時彼品粗重皆悉輕微之時非彼品攝依異熟識隨逐不離故名異熟識品之粗重又此粗重染之遺氣而非是染故亦說名有漏粗重猶如子思父之遺體但是有父非即是父有染之義當知亦爾如瑜伽說問諸煩惱品所有粗重阿羅漢等永斷無餘復有何品粗重彼所未斷由斷此故說名如來永斷習氣答異熟品粗重阿羅漢等所未能斷唯有如來名究竟斷又下文言復次略有二種粗重一染粗重二有染粗重染粗重者阿羅漢等煩惱斷時悉皆永斷此謂有隨眠者有識身中不安隱性無堪能性有染粗重者隨眠斷時從染所生染所薰發本所得性不安隱性若依附性與彼相似無堪能性皆得微薄又此有染粗重名煩惱習氣羅漢獨覺所未能斷唯有如來能究竟斷故如說煩惱習氣性相所知鄣氣當知亦爾故此習氣通於二鄣如對法論云如來永斷一切煩惱鄣所知鄣及彼習氣寶性論云不淨者一切凡夫有煩惱鄣故有垢者以諸聲聞辟支佛等有知鄣故有黠者以諸菩薩摩訶薩等依彼二種習氣鄣故以此等文當知二鄣皆有習氣一切菩薩所未能斷故此習氣非二鄣攝別為第三名習氣鄣若就性類相似之義亦名最極微細二鄣如深密經說十一鄣中言於如來地對治極微細最極微細煩惱鄣及所知鄣故又復此二鄣氣種子斷時方有習氣未斷已前無微薄故種斷無間方有微薄故名為無間生習氣如前所說別習氣者煩惱種子未斷已前已有習氣是故說名前生習氣如瑜伽說隨眠者有二種謂可害及非可害習氣者亦有二種謂無間生習氣及前生習氣故五約五法定鄣體者何謂五法一心法二心所有法三色法四心不相應行法五無為法如前所說二鄣現行直是心所有法所攝論其眷屬心法色法心不相應行法亦相應行法亦相從攝二隨眠中種子隨眠其現行二法所攝以是性緣性分別故前生習氣現行種子亦是心心所有法所攝一切粗重隨眠及無間生習氣唯是不相應法攝以非性相應故草四種不相應內是異生種類所攝以不堪能諸聖法故然異生性有粗有細粗者見斷煩惱未斷之時所有粗重不堪聖法此時假立異生所言細者金剛以還一切粗重隨其所對不堪聖法故通名異生性雖有此二而於論中但約粗相立異生性例如四相有粗有細細在剎那粗在相續而於論中唯立粗相如對法論云當知依相續位建立生等非約剎那故異生性中粗細亦爾故知粗重異生性所攝上來五重合為第一依顯了門出鄣體竟二依隱密門出二鄣體者六種染心是煩惱㝵體根本無明是智㝵體言六染者一執相應染二不斷相應染三分別智相應染四現色不相應染五能見心不相應染六根本業不相應染此中初二在於六識第三一染在第七識後之三染俱在第八識於中委曲具如起信論記中說此不重顯此煩惱㝵六染之中已攝前門二鄣皆盡根本無明者彼六染心所依根本最極微細冥暗不覺內迷自性一如平等未能向外取差別相故無能取所取異乃至與真明其相太近故此無明於彼最違如下沙彌與和上坐近也於生死中無有一法細於無明而作其本唯此為元忽然始起是故說名無始無明如本業經言其住地前便無法起故名無始無明住地起信論云以不達一法界故心不相應忽然起念名為無明故此言無前及忽起者非是竪望時節前後唯是橫論細粗緣起如是無明雖非與異熟識相應而為作本和合不離故依此識方說其相由是攝在梨耶識位如彼論云以依阿利耶識說有無明不覺而起故是謂隱密門中智㝵體相出體分竟次第三明鄣功能者亦有二門顯了門中煩惱鄣能略有二種謂能發業及能結生發業之能亦有二種先發引業後發生業通而論之一切煩惱皆發引業亦發生業於中別取其最勝者無明能發引業愛取能發生業如瑜伽說十二支中二業所攝三煩惱攝又二業中初是引業後是生業三煩惱中一能發起引業二能發起生業故此中發引業者發現起業發生業者發種子業由能薰發先行種子令成能生轉為有故引業能發即有二種發罪業時現縛能發福不動業隨眠能發發生業時罪福不動皆有現行愛取能發又發引業中俱生煩惱發別報業唯分別起隨其所應能發三種惣報引業所以然者若達三界皆苦亦知生苦之因自然不作苦因之業由是道理若有不了苦因無明其勢能發牽生之業又復若解無我自他平等何由強作自受報業是故不了無我無明其勢能發引惣報業由是義故修道所斷迷事煩惱不能發起惣報引業若依是義俱生我見相應無明亦迷無我自他平等實能發起引生之業但得見道後離其助伴勢力微故不能發耳如瑜伽說問何因緣故福不動業由正思擇功力而起仍說用無明為緣耶答由不了世俗苦因為緣發非福業由不了勝義苦因為緣生福不動業故此明由迷惡趣苦苦之因緣以此無明能發罪業故言不了世俗苦因由迷善趣行苦之因以此無明能發善業故言不了勝義苦因對法論云愚有二種一異熟愚二真實義愚由異熟愚故發不善行由真實義愚故發福不動行初者是染污性無明合時心不容受信解異熟行相正見故後者真實義即四諦於彼愚故未見諦者雖起善心由彼隨眠所隨縛故亦名愚癡由彼勢力於三界苦不如實知便能發起後有因性福不動行非已見諦者能發此業無真實義愚故是故彼業說因此生是意欲明發業無明皆是正迷四真諦義亦悉不了異熟因果但發善業時雖未通達四諦道理而能信解異熟因果故於此時無明隨眠設其不了異熟因義發罪業時非直不了四諦道理亦無信解異熟因果故於此時無明別名異熟愚也次明結生相續力者所結之生不出二種一者正生二方便生結正生時亦有二種生有色界中有時結生無色界死有時結二結方便生唯在死有然臨死有心有其三位謂前三性心位其次染污心位最後異熟心位此中初二是意意識最後一心是異熟識又三性位非結生時後之二心是結生位又後二中初是現纏結生之位後是隨眠結生位也如瑜伽說又欲界沒生上地時欲界善心無記心無間上地染污心生以一切結生相續皆染污心方得成故又從上地沒生下地時從一切上地善心染污心無記心唯有下地染污心生又下文言臨命終時最後念心必是異熟法結生相續無間之心亦是異熟故若論中有最後念心必是染污從此已前即無定位結生時節略說如是此中何等煩惱能結生者通相而言自地所有一切煩惱皆能結生論最勝者唯由俱生無記我愛結生相續如瑜伽說問於彼彼地結生相續彼彼身中當言全界一切煩惱皆結生耶為不全耶答當言全非不全何以故若未離欲於此生處方得受生非離欲故又未離欲者諸煩惱品所有粗重隨結自身亦能為彼異身生因故又將受生時於自體上貪愛現行於男於女若愛若恚亦互現行乃至廣說此文就其通相說也又彼論言云何生謂我愛無間已生故乃至即於此生處中有異熟無間得生對法論云相續力者有九種命終心與自體愛相應於三界中各各命相續此自體愛唯此俱生不了所緣境有覆無記性攝而能了別我自體生差別境界由是勢力諸異生輩令無間後有相續如此等文就別相說所以未捨上地法時能起下地結生惑者此有二義一若在上地上地業盡臨命終時生處法爾必定先退彼境地功德是故此時能起下結猶如生無想天臨命終時生處法爾必定先退其無想事然後命終此亦如是故二凡夫生上非伏我見由此未伏我見力故將生下時能起我愛如說依世間道乃至能離無所有處所有貪欲於諸下地其煩惱心得解脫而未能脫薩迦耶見由此見故於下上地所有諸行和雜自體不觀差別惣計為我或計為我所由是因緣雖升有頂而後退還故由是二義離先所伏修斷煩惱死臨時堪能還起由是言之結三界生正是修道所斷煩惱發惣報業正是見道所斷煩惱相從而說通發通結如攝論云若無下無明諸行不生若無修道無明諸行不熟者是明分別我見相應無明能發惣報引業境界愛相非無明能助彼業令成生業佛性論云福不動業增長家因者思惟能成業見諦能得果者是明由境界愛增長引業令成生業故名成業非能始發引業故不言能發業由我愛力業能得果故言見諦能得果也彼論者意境界愛等迷五塵事故名思惟我愛是乖無我道理故名見諦而是我愛非分別起是故還為修道所斷由是道理故不相違又於此中約人分別者一切異生纏及隨眠皆是結生若諸菩薩纏及隨眠並非結生二乘聖人即當分別何者依通相門一切聖人唯有隨眠結生相續以諸聖人將受生時於男女中無愛恚等故別相門初二果中俱生我愛亦有現行唯第三果不起此結直由隨眠結生我愛結生違聖意故無漏道力漸增盛故如瑜伽說結生相續略有七種一纏及隨眠結生相續謂諸異生二唯隨眠結生相續謂見聖迹三正知入胎謂轉輪王四正知入住謂獨覺五於一切位不失正念謂諸菩薩六業所引發結生相續謂除諸菩薩七智力所發結生相續謂諸菩薩此說隨眠結生謂見聖迹是約通相結生門說對法論云未離欲聖者亦爾乃至未至不明了想位其中能起此愛然能了別以對治力所損伏故已離欲聖者對治力強故雖未永斷然即此愛不復現行由隨眠力令生相續此約別相結生門也上來所說發業結生是說六識所起煩惱若說末那相應四惑一切位中恆有現行通能作本發業結生如是發業結生之義三種緣生門中在愛非愛及與受用二緣生門三種薰習之中唯在有分及與我見二薰習門是謂煩惱鄣功能也所知鄣者於三界中無有發業結生功能非迷四諦人空理故然此別有二種功能何等為二一者分別諸法自性差別故能薰成十八界由是辨生諸法體相此是因緣之功能也三種緣生中自性緣生三種薰習中言說熏習二者此所知鄣分別自他違順等相能生見𢢔貪瞋等事此是增上緣功能也依顯了門釋鄣能竟隱密門內二㝵能者此中亦有發業結生言發業者無明住地發無漏業能受界外變易生死此是無作四諦道理如前所說顯了門者直是有作四諦門也如夫人經言又如四取緣有漏業因而生三有如是無明住地緣無漏業因生阿羅漢辟支佛大力菩薩三種意生身故惣說雖然於中分別者此中所發無漏業者方便道中道分善根不為三漏所發所潤不受三有故名無漏當知集諦有其二種謂有漏集諦無漏集諦所生苦諦亦有二種謂有為苦諦無為苦諦如寶性論云何名為世間以三界相似鏡像法故此明何義依無漏界中有三種意生身應知彼因無漏善根所作名為世間以離有漏諸業煩惱所作法故亦名涅槃依此義故勝鬘經言有有為世間有無為世間有有為涅槃有無為涅槃故能發業中亦有二種一無明住地能發引業二愛取習氣能發生業無明住地所以能發引生死業者由此無明迷自心性本無起動終無變異緣此勢力堪能發起滅意生身變易生死業菩薩見道永離能所隨分通達本無起動是故雖有無明而不成感生之業由此勢力其後所起方便道等亦應不成引惣報之業例如二乘見道已後雖有俱生我見無明而不得成惣報之業當知此中道理亦爾所以人執習氣法執分別不能發此無漏業者若於三乘不無此義但其菩薩方便道中為對治彼修無漏業鄣治相違故不能發例如欲界人我執等終不能發彼不動業鄣治相違故此亦如是故無明住地非無漏業所能伏滅是故能發如是無明通發三乘無漏引業故唯說此為發業也發生業時唯能閏發能取種子令成能與非發現起無漏之業由是義故愛取習氣妄想分別能發生業如智度論說阿毗跋致菩薩習氣力故受法性生身是顯發生業義寶性論云緣相者謂無明住地與行作緣如無明緣行此亦如是故此明發引業義又彼論云依彼無明住地緣細想戲論習因無漏業生於意陰是文俱顯二種支業次明結生相續力者羅漢獨覺受彼生時我愛習氣此中結生及發生業是煩惱㝵功能此等皆在六染中故發引業者是智㝵力無明住地非六染故又此智㝵別有二種殊勝功能一此無明動真如流轉生死如經言即此法界說名衆生論云自性清淨心因無明風動故二此無明能薰真如變生一切諸識等法如經言不思議薰不思議變是現識因論云真如淨法實無於染但以無明而薰習故即有染相故由有如是二種力故能作二種生死依止如經言此三地彼三種意生身生及無漏業生皆依無明住地有緣非無緣故當知無明其力殊勝如偈中說一切諸法中般若最為勝能至無所為而無所不為而無不為故一切生死中無明力最大能動一法界遍生三生死故上來二門明鄣能竟次第四明諸門相攝者諸惑差別乃有多種今撮其要略攝六門一一百二十八種煩惱二百四惑三九十八使四八種妄想五三種煩惱六二種煩惱初言一百二十八煩惱者謂迷四諦分別起通取三界有百二十八種如瑜伽論本地分說於欲界苦集諦及彼欲界增上滅道諦具有十種煩惱迷執於色界苦集諦及彼增上滅道諦除瞋有餘如於色界無色界亦爾於欲界對治修中有六迷執除邪見見取戒禁取疑色無色界有五迷執於上六中各除瞋故此十煩惱於四諦境云何分別起迷執者隨其根本有四別故是義云何此十煩惱惣有三分謂倒本倒體及倒等流倒根本者所謂無明倒體者謂薩迦耶見邊見一分見取戒取及貪言倒等流者除前之餘倒本無明亦有二種謂相應及獨行獨行無明者謂無貪等諸煩惱纏但於苦等諸諦境中由不如理作意力故諸不如實簡擇覆鄣暗昧心法如是名為獨行無明中若由不正作意推求苦諦不如實知覆鄣暗昧依無明計受者等隨是我見具起餘惑如是十種皆迷苦諦若推求集諦不如實知依此為本計作者等如是十種皆迷集諦此二直迷因緣依處故非生彼滅道畏又若由不如理作意推求滅諦不如實知依此無明計清淨我以此為先具起餘惑如是十種悉迷滅諦推求諦不如實依此即計知者見者此等十種是迷道諦此二無明所起煩惱還於滅道生怖畏想如其本不推求諦理直緣五薀而計我等如是一切皆迷苦諦由是義故於四諦下各有十種煩惱迷執如瑜伽說即此一切迷苦集者是迷彼因緣所依處行即此一切迷滅道者是迷彼怖畏生行對法論云又十煩惱皆迷苦集起諸邪行是彼因緣所依處故所以者何苦集二諦皆是十種煩惱因緣及所依處是故一切迷此因緣依處起諸邪行又十煩惱皆迷滅道起諸邪行由此能生彼怖畏故所以者何由煩惱力樂著生死於清淨法起懸崖想生大怖畏又諸外道於滅道諦妄起種種顛倒分別是故十惑皆迷滅道起諸邪行若迷此起邪行即見此所斷故又若由不如理作意推求真如佛性等理不如實知即謗大乘如是邪見是分別起成無間苦而非正迷安立四諦而不可說二乘不斷墮惡趣因無餘斷故所以能斷此邪見者二乘無漏諦現觀智亦觀非安立諦境故故此邪見相從入於迷四諦攝以四諦門空無我理與其佛性無二別故必由我見謗大乘故又此門中所以二見亦有俱生三見及疑唯分別起者以彼二見內計自體恆時數習是故亦有任運現行三見及疑推求道理不如實知不正計度非數數起故無俱生雖於諸事任運起疑不染污故非惑性攝故修斷惑唯有六種此等皆說六識所起若論末那相應四惑相從通入修斷四中是謂一百草八煩惱也次明一百四煩惱者見道所斷有九十四修斷有十合為百四如瑜伽論決擇分說云何建立迷斷差別欲界迷苦有十煩惱迷餘三諦各有八種除薩迦耶及邊執見上界除瞋餘如欲界修所斷者欲界瞋恚三界三種貪𢢔無明故所以身邊二見但迷苦諦者由於此中對治說迷故是義云何如是二見正反苦下無我無常二種行相故餘三門所起二見皆迷苦諦而起邪行其餘諸惑無如是義是故於彼託境說迷所以修斷無二見者得見道後起此者少故於此門略而不說末那三惑雖有名同亦不入於修斷三中是名一百四種煩惱三明九十八使門者見道所斷有八十八修斷有十惣九十八八十八者謂於欲界苦下有十道下有八謂除二見餘二諦下各有七種謂除二見及除戒取上二界中各除瞋恚餘如欲界修斷有十不異前說如十住毗婆沙論言使所攝名煩惱纏所攝名為垢使所攝者是十根本隨三界見諦思惟所斷分別故名九十八使非使所攝者謂不信等亦以三界見諦思惟所斷分別有一百九十六種纏垢故於此門中說諸煩惱我見為本由存我見故遍謗四諦依四邪見隨其所應起餘煩惱故於四諦迷執差別如廣論云以有我見故言無諦彼作是言我無有苦即是謗苦我無有因即是謗集我無有滅即謗滅諦我無有對治即謗道諦故此門意說凡諸我見必緣現在自體五蘊是故無不迷苦諦者其邊執見緣所存我計其斷常故亦迷苦是故此二不通三諦所以戒取唯迷苦道者凡論戒取不出二種一獨頭戒取緣邪戒事計為因等二足上戒取緣自邪見計為道等獨頭戒取是緣苦集而於集諦非正相反於因計因故若望苦諦即為正反於果計因故是故但為見苦所斷足上戒取唯緣道下謗道邪見計以為道於餘邪見不計為道所以然者由求道心起見謗道求得此見還計為道謗餘三諦不由求道是故彼見不計為道是故戒取不通集滅修所斷中所以不說俱生二見者望貪瞋等過患是微細由是不入煩惱中攝還屬修道所斷邪智是謂九十八使門也上來三門直是顯了門內煩惱鄣攝然此三門但隨一相說其邪行迷執差別未必一向定為然也四明八妄想者亦名八種分別如顯揚論云頌曰分別有八種能生於三事分別體應知三界心心法論曰八種分別者一自性分別謂於色等想事分別色等所有自性二差別分別者謂即於色等想事起諸分別謂此有色此無色有見無見等以自性分別為依處故分別種種差別之義三惣執分別謂即於色等惣事所立我及有情命者生者等假想施設所引分別由於積聚多法惣執為因分別轉故又於舍軍林等想事所立舍等假想施設所引尋思四我分別謂若事有漏有取長時數習我執所取由數習邪執自見處事為緣所起虛妄分別五我所分別謂若事有取乃至我所執所取等為所起分別六愛分別者謂緣淨妙可意事境分別七不愛分別八愛不愛俱相違分別如是略說有二種謂分別自體及分別所依所緣事此中初三分別能生分別戲論所依所緣事我我所分別能生餘見根本身見餘𢢔根本我𢢔愛不愛俱相違如其所應生貪瞋癡是故如是八種分別為起此三種事論說如是此中前三分別能生所依所緣事者是明薰成名言種子由是辨生十二處法如瑜伽說此中所說略有二種一分別自性二分別所依分別所緣事如是二事無始世來展轉為因謂過去世分別為因能生現在分別所依及所緣事現在依緣既得生已復能為因生現在世由彼依緣所起分別於今分別不了知故復生當來所依緣事彼當生故依彼緣彼復起分別此言所依謂內六處言所緣者是外六處此明惣攝十八界法三種分別熏習所生此中前二分別其相可解第三中言我有情等所引分別者此非我見計為實我直是漫緣世流布名取其惣相起諸分別是故不入煩惱鄣攝又此三分別惣攝一切所知鄣內分別皆盡以離此三相外更無所分別故但為更顯此所知鄣生煩惱鄣增上緣用故即就此三種惣分別隨其所應別立後五例如煩惱鄣中四種我見分別俱生惣攝一切但為更顯起我𢢔義故即就此二種我見別立自他二緣我見當知此中道理亦爾由五分別生煩惱事其相云何且如耳識聞說我聲次意識起尋求我名第三心時決定了別如是我名自異他事此三心位為我分別第三心後方起染心計度分別所謂我者是一是常作者受者等後時此我起我𢢔等如於耳識餘識亦爾如我分別我所亦爾此謂依二分別生見𢢔事愛分別者且如眼識緣淨妙色次意識生尋求妙相第三心位定知是妙便起樂受而未生貪此三心位名愛分別決定心後方起染愛復二分別生瞋癡事如其所應准此可解是謂依三分別生貪等事此中五種分別是所知鄣所生二事是煩惱鄣子細而論第三心後起煩惱時即有如是五種分別所知鄣性作煩惱本但約粗相道理直說前後相生耳由是義故八種分別悉是正迷第四真實如古論云如是如實凡愚不知起八妄想已後生三事新論中言又諸愚夫不了真實從此因緣八分別轉能生三事故如是八種妄想分別是顯了門所知鄣攝五明三種煩惱門者謂見道所斷衆修道所斷衆非二所斷衆論其相攝即有二重若約二乘明三種者煩惱鄣內分別起者是見道所斷俱生煩惱是修所斷所知鄣是非二所斷若就菩薩明三種者此二鄣中諸分別起是見所斷任運起中除第八識是修所斷此前所除微細知鄣又前所斷二鄣習氣及隱密門煩惱㝵內根本業染及與智㝵無明住地此等皆是非二所斷唯究竟道所能斷故此約粗相顯其差別巨細道理後門當說六明二種煩惱門者謂住地煩惱及起煩惱起煩惱者謂顯了門所說二鄣諸心相應纏及隨眠皆依住地而得生起故名起惑譬如一切草木及其種子皆依大地此亦如是故住地煩惱者惣即唯一無明住地其相如前出體分說論其差別略開為二一者生得住地或名見一處住地二者作得住地或名有愛數住地言生得者不覺一如忽然而生其前無始故言生得其所迷處既是一如不同作得迷三有處故言一處一處一相平等平等無有能見所見差別於此不覺故名為見如其覺者即無見故是故名見一處住地言作得住地者謂依生得住地起三有心不了彼境即是如如是能起三有煩惱此即由起彼心不了彼境非任自迷故言作得由與有愛同迷境故入有愛數中所攝是故亦名為有愛數住地又此作得住地起三有愛是故分作三種住地謂欲界住地色界住地無色界住地或名欲愛住地乃至有愛住地彼一生得此三作得合說即有四種住地然此作得三種住地其不覺相與本生得等無粗細由是義故惣說四種名為無始無明住地又此四種皆非相應不同起惑剎那相應是故通名心不相應無明住地喻如夜暗遍一天下於中有起三重榭者榭內之暗為榭所攝是故別名三榭之暗然此三榭內所有暗相與天下暗等無差別故還通名為一夜暗當知此中道理亦爾如本業經言一切衆生識始起一相住於緣背第一義諦起故名惑是為住地名生得惑因此住起一切惑從一切法緣生名作得惑起欲界惑名欲界住地起色界惑名色界住地起心惑故名無色界住地以此四住地起一切煩惱故為始起四住地其四住地前便無法起故名無始無明住地金剛智知此始起一相有終而不知其始前有法無法云何而得知生得一住地作得三住地佛知始終勝鬘經言煩惱有二種謂住地煩惱及起煩惱住地有四種何等為四一見一處住地二欲愛住地三色愛住地四有愛住地此四種住地生一切起煩惱起煩惱者剎那心剎那相應世尊心不相應無始無明住地當知此中別即唯有四種住地惣即唯一無明住地四外無一故唯言住地有四種四即是一故言心不相應無明住地如其惣別合數即有五種住地是即無明無明有通有別如多羅有其通別十二部經通名多羅是為通相餘十一部之所不攝直說薀界處等法門名修多羅是為別相無明亦爾四種住地通名無明是為通相無明住地如上二經之所說故其有愛數三所不攝直迷一處生得住地還受無明住地名者是為別相無明住地如經言無明住地其力最大唯佛菩提智所能斷故又直就有愛數所攝中惣別合數立四住地謂別三愛數住地及惣無明住地如經言非聲聞緣覺不斷無明住地又言阿羅漢辟支佛斷有愛數四住地故何以要須惣別合立者為顯能起三愛力異而其暗相無粗細故當知經中直言四住地者是說唯別四種住地一切住地皆入四中四中更言有愛數四住地者是謂惣別合立四種其見一處住地不入此四中四有二種應如是知又復於一無明住地所以通別立二種者為顯其力勝中最勝故是義云何如四住地中所有攝持一切上心所依種子以此種子比其通相無明住地者種子雖多其力微劣無明唯一而力殊勝所以然者一切種子唯能各各生自上心於餘無力其一住地通持一切上心種子是故殊勝猶如一切草木種子比一大地力此亦如是故如經言此四住地力中一切上心煩惱依種比無明住地算數譬喻所不能及故更就如是通相無明住地力內別取有愛數四住地比於有愛所不攝別相無明住地力者雖復同是心不相應而無明住地其力最大所以然者其有愛數四種住地皆是作得所迷狹小由是小智之所能滅無明住地體是生得所迷一處廣大無邊一切小智所不能斷大圓鏡智方得除滅故此無明其力最大喻如舍內之暗一燈所滅遍天下暗非燈所遣唯日輪出方能除滅當知此中無明亦爾如經言如是無明住地力於有愛數四住其力最大阿羅漢辟支佛智所不能斷唯佛如來菩提智之所能斷故是謂住地及起二種煩惱差別此二之中起煩惱者顯了門內二鄣所攝及隱密門煩惱㝵攝住地煩惱者顯了門中不顯此惑唯隱密門智㝵所攝惣而言之略有六句或有煩惱門唯煩惱所攝或有惑門唯所知鄣所攝或有惑門通二鄣所攝此三種門已如前說或有惑門唯顯了門中二鄣所攝非習氣攝如三住所斷六種粗重等或有惑門通二鄣正及習氣攝謂十一地所斷十一種鄣門等或有惑門二鄣正習及二㝵攝謂二十二愚癡及十一種粗重等此餘一切諸煩惱門隨其所應惣攝應知當知如是二鄣二㝵惣攝一切惑門既盡諸門相攝分竟第五明治斷者略有四重一簡能治二定所斷三明治斷差別四辨治斷階位簡能治者能治之道惣說有二謂世間道及出世間道世間道義如常可解出世間道者有其三種謂見道修道及究竟道此三道內有五四三如其次第差別應知見道五者一資糧道二方便道三無間道四解脫道五勝進道修道四者除資糧道有餘四種先已積集二資糧故究竟道三者除勝進道有餘三種無上菩提無所進故初五之中資糧道者謂諸凡夫所有尸羅守護根門等乃至勤修止觀正知而住諸如是等解脫分善根為資糧道方便道者所有資糧皆是方便復有方便非資糧道所謂順決擇分善根無間道者謂方便道最後剎那世第一法無間定位由此道力從此無間必能永斷惑種子故解脫道者謂正通達見道自性以此見道自性解脫證斷煩惱之解脫勝進道者謂後得智具知名義勝前智故為進後位起加行故惣相雖然於中分別者此中餘四種道具如一道章說今且說其第四一種立此見道有二道理一者安立聖教道理二者內證勝義道理初門之中先明二乘後說菩薩就二乘人入見道時說十六心次第而轉漸斷上下八諦下惑如聲聞地決擇中言苦法智品見道對治欲界見所斷法苦類智品見道對治色無色界見所斷法故所以安立十六心者由此見道能生出觀十六行相差別世智是故因中說其果相若論菩薩入見道時有三種心次第而起初觀人空對治人執次觀法空對治法執第三心時惣觀二空證斷二執如瑜伽說從順決擇分邊際善根無間有初內遣有情假法緣心生能除軟品見道所斷煩惱粗重從此無間第二內遣諸法假法緣心生能除中品見斷粗重從此無間第三遍遣一切有情諸法假法緣心生能除一切見斷粗重故所以安立此三心者由方便道次第別修由是加行得入見道是故果中說其因相是謂安立聖教道理建立見道差別相也次明內證勝義道理者三乘聖人入見道時唯有一心內證真如無有十六及三差別言一心者入觀之內唯有一品前後相似無差別故說名一心非約剎那名為一心如夫人經言聲聞緣覺初觀聖諦以一智斷諸住地一智四斷深密經言一切聲聞獨覺菩薩皆共此一妙清淨道皆同此一究竟清淨故又顯揚論云除衆生執現起纏故覺法實性永斷法執法執斷時當知亦斷衆生執隨眠瑜伽論中亦同此說依此等文當知菩薩一時頓證二空真如頓斷二執種子隨眠若皆一心並證真如三乘見道有何異者二乘唯觀安立門內所顯真如真如差別如從竹管以見空色菩薩通依安立非安立諦法門通觀真如自性差別如有清淨天眼通者遍都見內外空色是故同見真如而有差別如瑜伽說云何聲聞乘相應作意修謂由安立諦作意門內觀真如緣有量有分別法為境云何大乘相應作意修謂由安立非安立諦作意門內觀真如緣無量無分別法為境等乃至廣說又下文言略說法界有二種相一差別相二者自性差別相者謂常住相及寂靜相常住相者謂本來無生法性及無盡法性寂靜相者謂煩惱垢離繫法性言自相者謂於相名分別真如正智所攝一切法中由遍計所執自性故自性不成實法無我性此中聲聞由差別相通達法界不由自相以通達彼何以故由無沒相及安隱相於法界中得寂靜相於一切行一向發起厭背之想若諸菩薩俱由二相通達法界入於菩薩正性離生已當安住緣於法界自相作意何以故由於法界緣差別相當作意時速趣涅槃故於阿耨菩提非正方便故是謂大小見道差別又三乘人入見道時末那相應平等智生隨其所應緣平等性與意識智同所緣轉所以然者無漏意識必有無漏不共所依故如顯揚論云意者謂從阿賴耶識種子所生還緣彼識我癡我愛我我所執我𢢔相應或翻彼相應於一切時恃舉為行或平等為行與彼俱轉了別為性如薄伽梵說內意處不壞外法處現前及彼所生作意正起如是所生意識得生故瑜伽論說問若彼末那於一切時思量為性相續而轉如世尊說出世末那云何建立答名假施設不必如義又對治彼遠離顛倒正思量故即此末那任持意識令分別轉是故說為意識所依此問意言如上施設末那相云此意恆與四惑相應於一切時思量為性是即出世末那不可建立以一切時思量我故答意有二種初者且約世間施設名義說一切時思量為性就其實義非一切時思量我塵是故名假施設未必一切皆如實義後意者又此末那有顛倒時思量我塵離顛倒時思量無我恆與意識共境而轉故說意識不共所依是故雖一切時思量為性不廢建立出世末那也所以末那不修方便直由他修忽離顛倒者不共依故自性淨故如異熟識不修方便而由意識聖道勢力彼異熟識忽離種子由諸轉識通所依故末那亦爾不修方便而由意識無漏道力忽離相應四種煩惱以是意識不共依故又末那自性本來清淨唯由相應且被染耳故離倒時即正思量如思所成地頌曰染污意恆時諸惑俱生滅若解脫諸惑非先亦非後非彼法生已後淨異而生彼先無染污說解脫諸惑其有染污者畢竟性清淨等下即釋言又顯所說解脫之相謂非即彼生已後方清淨別有所餘清淨意生即彼先來無染污故說為解脫乃至廣說依此等文當知出世意識必有出世末那惣相雖然於中分別者菩薩見道證二空故末那二執悉不現行即與二空平等智俱二乘見道但證人空末那法執猶得現行唯與人空平等智俱如意識中證人空邊成無漏智取苦相邊即是法執唯一惠數亦智亦執而不相妨所望別故平等性智當知亦爾見道差別其相如是此二識智及五種道何者能治誰不能斷者如是二智皆能對治煩惱粗重性相違故同一品故又五種道亦悉能治所以然者由資糧道猒患對治漸損煩惱種子勢力至方便道隨分漸捨彼品粗重由無間道能令無間永滅種子故是二道為斷對治由解脫道能轉煩惱解脫之得故為轉對治由勝進道令遠煩惱解脫之得故為轉對治由勝進道令遠煩惱成熟得故遠分對治如對法論云斷對治者謂方便道及無間道由彼能斷諸煩惱故乃至廣說由如是等五道二智衆緣和合方得永離見惑隨眠故說諸緣皆是能治離衆緣外無能斷者故然更就諸緣求其能治終無有一正能斷者何以故如前三道不離相縛隨眠所逐故不能斷第四一道自性解脫無所斷故亦非能治況勝進道而有所斷如是推求斷不可得以一切法無作用故尚不自住況滅他故雖無能斷而非不斷由前中後衆緣和合故如十地論云此智盡漏為初智斷為中為後非初智斷亦非中後如燈炎非初非中後前中後取故其實雖然於諸緣中拔其最勝與斷功者唯解脫道說名正斷如瑜伽說問此諸現觀能為煩惱斷對治者為生已作斷對治耶為未生耶答此非未生雖言已生而非後時當知煩惱斷時對治生時平等平等即於爾時假施說言對治生已諸煩惱斷又下文言若觀品所攝無漏聖道見斷隨眠隨逐生者應不得名對治體性是明見道自性解脫故為正斷對治體性修道位中四種道相大分同前准之可解於中差別者其方便道易得成熟不如前時順決擇分長時勤修方入正觀由前已得聖道乘此勢力進入其次增品道故又無間道與解脫道未必如前一向別異如將入八地無相觀前無間道心非解脫道十地終心金剛喻定唯解脫道非無間道此二中間所有諸心望前為解脫道望後作無間道七地已還修道位中隨其增微分有此義如論說言剎那剎那能壞粗重依法故究竟道中方便道者於第十地勝進分中為欲拔除根本無明仍不出觀進修方便方便成滿最後一念是無間道如對法論云竟究道者謂金剛喻定此定有二種謂方便道攝及無間道攝故當知最後金剛喻定若望修道所斷一向是解脫道若望非二所斷一向為無間道又復金剛以還乃至初地皆為究竟道之方便道勝解行地所有善根皆此究竟之資糧道例如第十回向勝進分中別修見道之近方便通而說之世第一法以還乃至十解初心皆為見諦之方便道十信位中所修善根亦是見諦之資糧道於究竟道當知亦爾究竟道中解脫道者佛地所得大圓鏡智以為其體如經云無㝵道中行名為菩薩解脫道中離一切鄣號曰如來故此二道位有等不等何者若望修道所斷煩惱金剛心位已得解脫於此智斷佛不能過故名等覺及無垢地如經言行過十地解與佛同故若望非二所斷無明此時未離但是信解未能證見雖得照寂而非寂照是故但名菩薩未名覺者如經言從習忍至金剛三昧以無相信照第一義諦不名為見所謂見者是薩般若故當知菩薩未成佛時依十八空七種真如唯由是門照第一義諦未能離令寂照獨空出無明縠了達一如唯佛如來大圓鏡智直達獨空體一法界二諦之外獨在無二例如世第一法以前未能離相通達法空故有能取所取二相若得見道無分別智通達二空永離能所二相之外獨在無二是故說名佛見清淨當知此中少分相似依此義故瑜伽論說問一切安住到究竟地菩薩智如來智等云何差別答如明眼人隔於輕縠覩衆色像到究竟地菩薩妙智於一切境當知亦爾如明眼人無所鄣隔覩衆色像如來妙智於一切境當知亦爾如畫事業圓布衆采唯後妙色未淨修治已淨修治菩薩如來二智亦爾如明眼人微暗見色離暗見色二智亦爾如遠見色如近見色輕翳眼觀極淨眼觀二智差別當知亦爾此中五喻有何異者本識相應最細妄想無明所識隔金剛眼是故似彼隔於輕縠萬行皆備三智已得而唯未得大圓鏡智如來淨治最後妙色解脫二鄣故得淨眼未離極微無明住地是故不異微暗見色有惑鄣習而非親鄣法空觀智故如遠見色其智鄣氣雖是微薄近蔽惠眼事同輕翳五喻差別應如是知上來所說簡能治竟次第二明定所斷者略有四句一依主伴二據起伏三約通別四就時世初依主伴定所斷者若就生滅門明其相應者心及心法並是所斷被相應縛無離別故如無相論說若見諦肉煩惱識及心法十六心時究竟斷盡故若依是義除滅生死心及心法更得佛地心及心法此中無有得作佛者唯有五陰前滅後生依此義故佛經中說捨無常色獲得常色受想行識亦復如是若據相續門簡其自性者心非惑性不在所斷雖被他染自性淨故猶如濁水澄自性故如瑜伽說問染心生時自性故染為相應故為隨眠故答相應故隨眠故非自性故由彼自性不染污故說心生時自性清淨故又問諸法誰相應為何義故建立相應答他性相應非自性為遍了知依自性清淨心有染不染法若增若減是故建立若依此門不淨位中八識心王離諸染數終至佛地即與四種淨智相應依此義故佛經中說凡有心者當得菩提二據起伏定所斷者通相而說纏及隨眠皆是所伏並為所斷約近而論纏是所伏而非正斷唯其隨眠正為所斷如顯揚論云永害隨眠說煩惱斷故三約通別定所斷者一往而言通別二執皆是所斷窮而說之其別相惑正是所斷亦為所治如斷病本亦名治病故通相法執唯是所治而非所斷由其亦解亦執非一向惑故唯修治令得清淨喻如治不淨鏡令成明淨但名治鏡不言斷鏡故四就時世定所斷者此中先竅三世後定所斷若欲究竟顯諸三世相略以九句明其差別其九是何一過去過去二過去未來三過去現在四未來過去五未來現在六未來未來七現在未來八現在過去九現在現在如花嚴經言菩薩有十種說三世何等為十所謂過去世說過去世過去世說未來世過去世說現在世未來世說過去世未來世說現在世未來世說無盡世現在世說未來世現在世說過去世現在世說平等現在世說三世即一念是謂菩薩十種說三世因此十種說三世故即能普說一切三世此中第六說無盡者為顯諸法未來未來無後邊義故名無盡第九中言說平等者欲明此中現在現在望前過去現在望後未來現在其現起相等無差別不由今現更增現相故約今現說其平等最後句中言三世即一念者此一言內略有二義一者雖於現法說有過未世然過去不在現過已後未來不居未現之前但於現在一念之內望前為未來望後為過去當其自相說為現在破小乘未現之時冥在未來現滅已後伏居過去過去是現念之後未來是現念前故言說三世唯一念也二者如前九句所說三世惣攝一切無邊三世如是三世長遠無邊皆入現在一念之頃或彼三世即是一念故言三世即一念也雖長遠劫即是一念而非成短方為一念雖即一念是無量劫而非剎那究竟長遠故彼偈言無量無數劫即是一念頃亦不令劫短究竟剎那法此意為破大乘一向執言未來未有過去已無一切剎那是為短斷三世劫是為長故言說三世即一念雖於三世十種而說論其世別不出前九故就此九句以定所斷於此九世斷何世惑者過去三世皆非所斷治道生時皆已滅故現在三世亦非所斷治道現時無現惑故未來未來亦非所治斷道生已相不改故未來過去亦非所斷斷道生時勢不及故未來現在正為所斷所以然者設於此時治道不生即於此時隨眠當現當現正是未來現在由於此念治道現前於此隨眠當現應成而永不成說名為斷是故未來現在正被所斷其餘八世非正所斷如顯揚論云未來現在煩惱可斷永害隨眠名煩惱斷故雖依此門說如是斷而求此斷亦不可得何以故治道生時望彼隨眠未來現在為有為無若猶是有即非所斷若已是無即無可斷若彼未來現在二由斷故後無者即彼未來現在未斷之前是有唯是一念未來現在先有後無不應道理一剎那頃無前後故又即是一念未來現在即有即無亦不應理無有一法二自性故由此道理故無可斷是即一切三世並非所斷但是治道自性解脫徑歷三世恆離繫縛是故得說通斷三世如瑜伽說問斷隨眠時為去未來現答非斷去來今然說斷三世乃至廣說故定所斷竟三明治斷差別者略有三句一伏斷差別二斷縛差別三離繫差別伏斷差別者何謂為伏離諸惑緣修其對治加惑本上令末不起損伏之義當知亦爾損伏差別有其三種一遠離損伏謂如受持禁戒遠離惡緣由是勢力不起惡故二猒患損伏謂以聞思二惠知諸欲過於彼過患修猒逆想由是勢力不起著故三奢摩他損伏謂由世間修惠欣上猒下隨其品別修假對治隨其所斷不現起故於中委曲如瑜伽說所言斷者有三差別一者伏斷二者永斷其第三者無餘滅斷言伏斷者譬如於石所加草根更以利鋤稱斷其根永令不能生其外莖根未滅故說名為伏根不續故亦名為斷如是已離欲人入見道時斷於欲界修斷種子此等一切皆名伏斷以未滅故勢用無續故言永斷者譬如於火鎗燋穀麥雖由鎗隔不失穀相而由火勢永不成種如是金剛以還乃至二乘斷種子義當知亦爾由無明隔故不失異熟識相由無漏勢故永不得成種子是故此等說名永斷如瑜伽說略有二種於斷作證一於種子伏斷作證二於種子永斷作證故然此永斷望無餘斷但為永伏未成永斷所言無餘滅斷者如劫盡時七日竝現通然空界巨海大地歇盡無遺乃至微塵永無餘殘如是三種無數大劫滿時四智竝現圓照法界藏識巨海無明大地歇盡無遺乃至二鄣微細殘氣永滅無餘是故說名無餘殘斷是謂三種斷義差別二明斷縛差別者縛有二種謂相應縛及所緣縛隨起一惑即具二縛以此二縛縛衆生心是義云何煩惱與心一時相應能縛此心令不得脫故名相應縛即此煩惱執所緣境能令其心隨著所緣名所緣縛如以一繩與牛相應面縛其牛令不能脫即以繩端緣縛於柱能令其牛隨著彼柱二縛縛心當知亦爾斷此二縛實在一時論其義次第又有前後何者問心王王今何緣於所緣境得離著乎心即答言有一惠數忽然而至斷除與我相應之縛故於所緣無所著耳而不自知彼何所斷即問惠數卿有何術斷相應縛惠數釋言臣無異術但性明利破遣粗相於所緣相永離執著由是能斷彼相應法是即依惠數言先斷所緣縛後斷相應縛依此義故顯揚論云斷所從者謂從所緣境斷諸煩惱於所緣境斷煩惱已諸相應法亦復隨斷若依心王言先離相應縛後離所緣縛依此義故瑜伽論說復次從相應及所緣故煩惱可斷所以者何對治道生煩惱不起得無生法是故說名斷彼相應相應斷已不復緣境故從所緣亦說名斷故斷二縛義應如是知三明離繫差別者繫有二種其二是何一由二縛隨品被繫義如前說二由能緣被多品繫是義云何且如彼惑具有九品其上上品心及心法通為九品能緣所縛如於一柱繫以九繩所緣之事被繫亦爾如上上品被九種繫其餘八品皆亦如是九品悉能互相緣故在隨眠位恆性緣故論其離繫即有二種謂於前二縛品別離繫於後一縛相屬離繫相屬離繫者雖斷初品二種之縛而被八品能緣所繫乃至已斷八品二縛此八品心被一品繫是故前八皆未離繫未離繫故不名已斷斷第九品二縛盡時前八此九一時離繫是故說名相屬離繫如一蘆束繫以九𦱖雖斷八𦱖而未離散斷第九繫一時離散相屬離繫當知亦爾如瑜伽說當知離繫亦有二種一於諸煩惱品別離繫二於諸煩惱事相屬離繫故治斷差別竟四明治斷階位者惣有三重一明凡夫二辨二乘三說菩薩諸異生位世間治道唯伏三空已還修道所斷煩惱捨其粗重不拔種子自餘一切非其所斷如瑜伽說若諸異生離欲界欲或色界欲但由修道無有見道彼於欲界得離欲時貪欲瞋恚及彼隨法鄰近憍𢢔若諸煩惱相應無明不現行故皆說名斷非如見道所斷薩迦耶見等由彼諸惑住此身中從定起已有時現行非生上者彼復現起如是異生離色界欲如其所應除瞋恚餘煩惱當知亦爾故若論末那相應四惑雖是修斷極微細故世間修道所未能伏次明二乘治道位者此有二義若就人法二執本末相依生門一切二乘於煩惱鄣唯是折伏而非永斷所以然者無廣大心不證法空由是不拔煩惱本故如其直當人執之內纏及隨眠相生門者皆是永斷而非伏斷由證人空所顯真如永害人執等種子故如彌勒所問論云一切聲聞辟支佛人不能如實修四無量不能究竟斷諸煩惱但能折伏一切煩惱此依初門作是說也又瑜伽說若聖弟子由出世道離欲界欲乃至具得離三界欲爾時一切染法種子皆悉永害如穀麥等諸外種子安置空逈或於乾器雖不生芽非不種子若火所損爾時畢竟不成種子損伏永害道理亦爾此依後門而作是說由是二門伏斷永斷皆不相違今且依永斷明其階降斷見惑者有其三人若從具縛入見道者斷見惑已證預流果倍離欲人入見道者兼斷倍離欲證一來果已離欲人入見道者兼斷九品證不還果如瑜伽說入見道者有其三種隨其所應證三果故惣說雖然於中分別者斷見惑時有三頓義一以一心頓斷三界二以一觀頓斷四種三以一品頓斷九種所以一心頓斷三者三界心行雖有粗細迷理輕重不隨界別是故一心頓斷三界所以一觀頓斷四者由壞緣諦作意相應通觀四諦無我理故所以一品頓斷九品者見道一心對第九品斷其輕時重隨滅故見道既是最初無漏所以忽對第九品者始從燸法修下下觀迄至見道成上上故無間道下既對八品所以不能斷彼品種子若不能斷八品種子何由能生上上品道者漸捨八品所有粗重由是能引上上品道此皆未證人空真如故不能拔彼品種子由是道理三乘聖人初入聖道竝是頓斷九品種子非謂對粗品道雖斷餘細品惑亦非唯一品道猛利故對九品修道位中乘前勢力漸修方便即入增品不須如前多品加行故於修惑隨品漸斷非謂修惑纏綿難斷故不一時頓斷九品後二種人所以能斷修惑種子者見道之品實不能對修惑之品是故不能永斷種子但此種子先已被伏今更重加見道利鋤故於彼種伏斷作證由是得修彼品治道於欲界生不復還受是故賞功加不還位倍離欲人准釋可解超越道理應如是知次約修惑明斷位者進修道人有其二種一漸出離義如常說二頓出離者謂惣緣三界所有諸法入無漏道漸修九品頓斷三界漸除九品此時直證阿羅漢果所以頓斷三界惑者如前所說品數輕重不隨行相之粗細故若爾何故有漸斷者於三界法不頓緣故如對法論云頓出離者謂入諦現觀已依止未至定發出世道頓斷三界一切煩惱品品別斷唯立二果謂預流果阿羅漢果此義以何為證如指端經說諸所有色乃至識若過去未來現在若遠若近惣此一切略為一分一團一積一聚如是略已應觀一切皆是無常一切皆苦乃至廣說又依此故如來於分別經中預流果無間即建立阿羅漢果故上來所明治斷差別是說六識所起煩惱若其末那相應四惑行相與品最為微細於三界中等無差別是故唯離非想欲時一時頓斷如瑜伽說末那相應任運煩惱唯離非想處欲故一時頓斷非如餘惑漸次而斷無相論云第二執識及相應法至羅漢位究竟滅盡若見諦肉煩惱識及心法得出世道十六心時畢竟斷滅餘殘未盡但屬思惟是名第二執識此中簡別二種斷義若意識中肉煩惱者十六心時皆悉斷盡故屬見諦此第二識彼斷所餘唯羅漢位方究竟滅是故此識但屬思惟也依此等文故知末那非見所斷是明二乘斷煩惱鄣所知鄣中有斷不斷惠解脫人都無所斷俱解脫者分有所斷謂八解脫鄣不染無知修八勝解所對治故如瑜伽說又諸解脫由所知鄣解脫所顯由是聲聞及獨覺等於所知鄣心得解脫故上來所說是顯了門斷心相應起煩惱義若論隱密門內住地煩惱一切二乘分有所斷此義云何三界住地及通相無明如是有愛數四住地在見道位斷其少分於三界中迷事境邊於此位中未能斷故是故於中唯斷少分如經言聲聞緣覺初觀聖諦以一智斷諸住地以一智四斷故至羅漢位有愛數四住地斷之已盡如經言非聲聞緣覺不斷無明住地以無二聖諦智斷諸住地故三就菩薩明斷位者亦有二義若依隱密門中本末相生義者金剛已還一切菩薩於諸煩惱但能伏斷未能永斷所以然者於一法界唯信未見不能拔諸惑之根本故如仁王經言從習忍至金剛三昧皆悉伏斷一切煩惱以無相信然第一義諦不名為見夫人經言若無明住地不斷不究竟過恆沙等所應斷法不斷不究竟故若依顯了門直說纏及隨眠相生義者始從初地至無垢地於二障種是皆是永斷所以然者雖未能見一法界義而得證見十重法界故惣說雖然於中分別者菩薩有二種若從二乘無學果成漸悟菩薩入初地時唯斷智鄣非煩惱鄣先已斷故如楞伽經言智鄣者見法無我殊勝清淨煩惱鄣者先習見人無我斷七識滅故若其頓悟菩薩三賢位中但能漸伏二鄣現行亦能漸捨見道所斷二鄣粗重未斷種子如本經言前三賢位伏三界無明而用粗業何以故當受生時善為緣子愛為潤業故花嚴經言第四生貴真佛子從諸賢聖正法生有無諸法無所著捨離生死出三界者是就不受繫業三界故為出非斷種故名為出也若入菩薩見道位時頓斷二鄣分別起種此中惣有五種頓義三如二乘見道中說第四頓斷二鄣者通證二空故第五頓斷煩惱鄣內見修二惑所以然者由是菩薩在地前時見道所斷一切煩惱能鄣利益衆生行者於方便道皆悉伏滅今得道更加其上故於彼種伏斷作證由是道理說名頓斷非於修惑亦是永斷如彌勒所問論云問若聲聞人先斷見道所斷煩惱然後漸斷修道煩惱菩薩何故不同聲聞答菩薩之人無量世來為諸衆生作利益事復見真如甘露法界觀彼一切諸衆生身而實不異我所求處是故菩薩見修道中一切煩惱能鄣利益衆生行故即見道中一時俱斷故此中所斷修道惑者但但說上中能鄣利益衆生行者論其下品不妨行者七地以還亦現行故如是乃至金剛喻定頓斷微細二鄣皆盡於中分別即有二行一者若據三重二鄣說斷能緣繫義唯在三地頓斷二鄣其餘下地皆未能斷但能修習彼斷資糧以是相屬離繫門故如瑜伽說經三無數大劫時量能斷二鄣所有粗重謂極歡喜住中一切惡趣諸煩惱品所有粗重皆悉永斷一切上中諸煩惱品皆不現前於無加行無功用無相住中一切能鄣一向清淨無生法忍諸煩惱品皆悉永斷一切煩惱皆不現前於最上成滿菩薩住中當知一切煩惱習氣隨眠鄣㝵皆悉永斷入如來地所知鄣者亦有三種當知此中在彼粗重極歡喜住皆悉已斷在膚粗重無加行無功用無相住中皆悉已斷在肉粗重如來住中皆悉已斷得一切種極清淨智於三住中煩惱所知二鄣永斷所餘諸住如其次第修斷資糧故此中最細所知鄣是在阿賴耶識故唯如來住之所斷最細惑鄣唯在轉識故菩薩住所能斷盡言習氣者八地已上永無現行故言習氣此是種子習氣非謂餘殘習氣是謂相屬離繫義也二者若依十重二鄣說斷相應縛義即於地地皆斷二鄣以是品別離繫門故如深密經言世尊於此諸地有幾愚癡有幾粗重為所對治善男子有草二愚癡十一粗重為所對治謂於初地有二愚癡一者執著補特伽羅及法愚癡二者惡趣雜染愚癡及彼粗重為所對治乃至於如來地有二愚癡一者於一切種所知境界極微細著愚癡二者極微細㝵愚癡及彼粗重為所對治由此草二種愚癡及十一種粗重安立諸地故是明品別離繫門也然此十地修道位中多住真如自相作意不修真如差別作意而入觀時通證二空所顯真如是故雙斷二鄣種子非不別修人執對治故不能斷人執隨眠如瑜伽說法執自性執我自性而轉覺彼由觀故還滅對法論云又諸菩薩於十地修道位中唯修所知鄣對治道非煩惱鄣得菩提時頓斷煩惱鄣及所知鄣頓成阿羅漢及如來是明頓斷二鄣頓得二果非望九品說頓斷也上來所明見修位中所斷二鄣皆在起惑未明住地若就住地煩惱說其治斷位者二乘所斷四種住地隨其所應菩薩亦斷除此以外亦能更斷通相無明地少分迷八妄想所緣境邊妄想斷時亦能斷故如起信論云不了一法界義者從信相應地觀察學斷入淨心地隨分得離乃至如來地究竟離故此就通相無明而說若論別相無明住地一切菩薩所不能斷唯佛鏡智之所頓斷依此義故仁王經言唯有頓覺如來無有漸覺諸佛夫人經言無明住地其力最大唯佛菩提智所能斷故又異熟識極微細著依此無明最微細㝵諸轉識中二鄣習氣隨異熟識不離而轉皆是菩薩所不能離唯有如來之所能斷是謂究竟道中所斷差別上來所說鄣治差別是約染淨非一義門故說鄣能尋道道能除鄣若就染淨無鄣㝵門鄣非㝵道道不出鄣鄣無異鄣如來既體如是道理故一切諸法即為自體既皆自體有何所斷有何能斷何得有出二諦外而灼然獨住者乎如經言生死與道合道即是生死故又論云無苦亦極苦無我亦我見故當知一切法及一切種門無鄣無有㝵悉然悉不然佛會如是性不集亦不散由無得不得故有斷不斷離相而窮往故號為善逝乘如而盡還故稱曰如來如經言諸佛還為凡夫故不空無無故不有法非法故不二非非法故不一由是道理斷與不斷皆無鄣㝵上來四門合為第五治斷分竟次第六惣決擇問若已永斷欲界惑者一切皆證不還果耶設其證得不還果者皆已永斷欲界惑耶答應作四句有已永斷欲界惑盡而非證得不還果者謂超越那含進斷色界九品惑時兼斷欲界被伏種子等有未永斷欲界種子而已證得不還果者謂如已離欲人入見道時於彼種子伏斷作證等第三句者漸出離人證不還時第四句者除上爾所事問若永離色界欲者一切皆入無色定耶設入無色解脫定者一切皆離色界欲耶答應作四句或有已離色界欲未入無色定謂依未至定離色界欲等或有已入無色定未離色界欲謂聖者已得第四靜慮不求生色界而由猒背第四靜慮捨斷結道依勝進道漸次能入空處等定第三句者依斷結道入空處定第四句者除上爾所事由是道理說滅盡定亦於色界重現在前如對法論云滅盡三摩鉢底要於人趣方能引發或於人趣或色界能現在前先已生起後重現前故此是依未建立阿賴耶識聖教而說就如實義於無色界亦重現前有異熟識及種子色為所依止命根得住此義具如瑜伽論說問三界之外為有衆生為無衆生此何所疑若有若無違聖言故答此有二義若如古說衆生之原原在識窟從彼流來來入三界是同外道經所說宗佛法之內無如是義是故若望過去求衆生本無始世來流轉三界若望其後修道除鄣出三界者即當分別何者若據現事有多衆生出三界外未離生死若就自性出三界外唯有佛地更無流轉言據事者曲有四重一趣寂二乘已出三界受意生身如經言出三界外有三種意生身故二直往菩薩於十住中第四住位已出三界受不繫身如經言第四生貴真佛子捨離生死出三界故三者於七地中三地菩薩由願力故損伏煩惱出三界外受淨土身若不依願力非直出故例如異生伏下地惑受上生等此亦如是如經言有清淨土出於三界三地菩薩由願力故得生於彼非諸異生及非異生二乘等故四者於十地中七地菩薩由行勢力故伏斷種子捨此身已受意生身例如超越那含無漏力故伏斷種子不生欲界此亦如是如經言初地乃至七地三界業果俱伏盡無餘八地乃盡故此等皆約現事三界說其不受故得出也而於自性三界如是四位乃至金剛皆未能出何等名為自性三界謂三界內八種分別之所業薰發自性緣生此中俱有三界所攝煩惱業報十八界性彼三乘人出三界者永斷三界增上緣種由是不受三界現事而其自性三界悉具有猶未能斷其因緣故若就能斷因緣種子以明能出自性三界者於初地中始斷粗品三界因緣即出粗品自性三界如是漸出乃至金剛斷最細品三界因緣出最細品自性三界而由未離習氣三界由是義故一切衆生在自性三界藏內唯佛如來獨出三界如經言一切衆生煩惱不出三界藏三一切衆生果報草二根不出三界諸佛應化法身亦不出三界三界外無衆生藏佛何所化是故我說三界外別有一衆生界藏者是外道大有經中說非七佛所說我常語一切衆生斷三界煩惱業果報盡者名為佛故問聲聞緣覺無學果者望於大乘配當何位答二乘正行有高有下故其配位亦有進退何者若就已得解脫身邊與諸佛同坐解脫床如楞伽經言聲聞緣覺諸佛如來煩惱鄣斷解脫一味非智鄣斷故若論解脫品即同十地最後念中人空解邊依此義故涅槃經中說四依言阿羅漢者住第十地若論其受最後身義即與七地菩薩位同依此義故仁王經言遠達菩薩伏三界集因業滅住後身中住第七地阿羅漢位若論外化神力等行還在十解菩薩已下如經言習種性中有十種心已起二乘一切善地故若就心行寬狹長短十信菩薩亦在其上如論說羅漢比丘知其沙彌發菩薩心推在前等故由是義故趣寂二乘隨其利鈍徑多劫數方到阿耨菩提心位如經言須陀洹人亦復不定以不定故徑八萬劫即能得到阿耨菩提乃至獨覺徑十千劫得到阿耨菩提之心此明何義如最鈍根須陀洹人受七生已方入涅槃滅心心法如入滅定徑八萬劫乃得生心生心之時受佛教化即發阿耨菩提之心若其一身得第二果受二生已入於涅槃徑六萬劫即能發心若其一身得那含果不還欲界入涅槃者徑四萬劫能得發心若其一身得第四果即於現身入涅槃者徑二萬劫即能發心若諸獨覺根性最利徑一萬劫便得發心此為彼經所說意也如是五人發心之時方與十信菩薩位等然於菩薩行中未能猛利修習不及本來大乘種性初始發心凡夫菩薩如世諺曰趣直住者應先裹糧盍謂此乎問上說末那緣一切法以何道理而得證成答證成道理略有二種先立比量後引聖言比量之中亦有二種一能立正二能破邪初能立者第七末那意識生時必與同境不共所依故凡諸所有不共所依能依生時必與同境猶如眼等如其未必同一境者見彼一切非不共所依如前滅等此所立因異三種相不可破壞故得成立言能破者如有立言末那不必與識同緣非相應故諸非相應見彼未必能所同緣猶如眼等或有立言眼等根不必與識同境非相應故諸非相應見彼能所不必同境猶如末那是謂決定相違過失故此二宗皆不得成所以然者若於末那所依能依非相應故許不同境即由此因於眼根等不得不許不同境義如由此因二處俱許不同緣義俱決定故又若眼等無緣之義為同法喻即成末那是無緣法若彼末那非無緣法但與能依不同境者即無同類因不得成由是能立及與能破末那與意識共境義立既意識同境界故緣一切法不立自成聖言量者如經言境界風所動七識波浪轉起信論主述此意以有境界緣故復生六種相何等為六一者智相乃至廣說此中智相即是末那中於一切時惠數相應故名智相於中委悉具如彼論記中已說依此聖言當知末那亦為六塵境界所起非直緣其阿賴耶識也問上說通相無明住地亦為二乘隨分所斷未知如是無明住地為有粗細為無輕重若有粗細故有斷不斷者即應通分與八識相應若是一向不相應故無粗細輕重異者云何二乘有斷不斷若使同迷我見等惑所迷理故雖非是粗而同斷者是則末那相應無明同與見惑迷無我理故於見道亦應共斷若此細故不能斷者彼最極細何得同斷答無明住地其相微密粗細輕重不可定說故一切種皆可得說何者若就功力增強遍生諸惑即應得說唯粗非細若就行相未分非心相應即應得說唯細非粗望其所鄣鄣下鄣上即可得說有重有輕直當自相一無增微即唯可說非輕非重其上無重其下無輕亦不可說唯在中品但由非輕故下智能除由非重故上智亦斷非輕重故中智得滅耳喻如法界流轉五道五道可說是粗永絶四句可說是妙望其所通通下通上即可得說有淺有深當其自相一無階降即唯所說非淺非深其下無淺其上無深亦不可說在其中間但由非深故下智得證由非淺故上智能會非深非淺故中智亦涉當知無明輕重亦爾末那無明是相應惑行相有定輕重有限故其對治唯在一品不可將有行相以例無明住地是故如是無明體相唯佛圓智照其始終後身菩薩究竟道智唯照其終未見其始照其終者於此無明所起三有達其非有亦照非無故未見始者於此無明所迷獨空唯有信解未能證見故如達所起三界有無亦照能起無明空有未見所迷一法界相故亦未達能迷行相是故如是無明行相甚深微密唯佛所窮難曰若使二執所迷二空之理是實不無聖智所照者亦可二惑所執人法之事是妄非有非聖所照若齊許者即無俗智撥無因果是大邪見若言雖無所執實法而有假法量智所照者是即雖無所執實我而有假我量智所照若齊許者聖智所照不出三法薀界處內我在何法若言實有假法實無假我者是即實有我空而無法空若二空齊有即人法等無若言如所執法實無所有故有法空而由法執名言薰習所生之法不實而有有而不實不廢法空者是即人執名言薰習所生之我不實而有有而不實不廢人空因時等習果非等生不應道理故若言於世俗諦因緣道理四緣和合有法生者他亦於世俗諦因緣道理五薀和合即有人生若五薀雖和無人生者四緣雖和亦無法生齊有薰習種子因緣果有生不生不應道理故通曰所設諸難皆有道理有道理故悉無不許無不許故無所不通是義云何若對外道所執是一是常是我即許有五薀而無一我離薀法外無神我故如經言無我無造無受者以因緣故諸法生又言如第三手如第二頭五陰中我亦復如是故若對二乘所執三世五薀之法即許有一我而無五薀離真我外無五法故如經言即此法界流轉五道說名衆生又言一切衆生皆有佛性即是我義者即是如來藏義故若對菩薩依甚深教如言取義起損減執即許我法皆悉是有如論說云又此假我是無常相是非有相非安保相是變壞相乃至廣說故若對菩薩依法相教如言取義起增益執即許人法皆無所有如經言尚無我無衆生乃至智者見者何況當有色受想行識故如其當因緣道理若人若法非有非無非無故說人法皆有量智所照非有故說人法二空理智所證理智所證者不損人法也量智所照者不壞二空也如花嚴經言分別一切法不取諸法相善分別衆生而無衆生相中邊論云謂實有我增益人邊實無有我損減人邊謂實有法增益法邊實無有法損減法邊依此聖言當知人法有無齊等是究竟義互說有無是隨宜說此所說我何法攝者若論法界衆生佛性之我非即薀界處不離薀界處而亦得說法界法處所攝此義具如十二門論說若論我見薰習所生假我十一識中自他差別識攝非即薀界處不離薀界處而亦得入行薀法界法處所攝如論說言如是假我不可說言與彼諸法異不異性故行薀之內何法攝者入於不相應法所攝草四中衆同分攝此亦名為衆生種類然此衆生及與諸法非如所說有人有法而非是無故作是說耳然二鄣道理唯佛所窮但依仰信聊須斟酌也慈尊末流應理圓實宗英實戒四歲三五
